<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#141428"/>
      <stop offset="100%" style="stop-color:#0c0c1e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a03c"/>
      <stop offset="50%" style="stop-color:#f5d78e"/>
      <stop offset="100%" style="stop-color:#c8922a"/>
    </linearGradient>
    <linearGradient id="gold2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c8922a"/>
      <stop offset="50%" style="stop-color:#f5d78e"/>
      <stop offset="100%" style="stop-color:#d4a03c"/>
    </linearGradient>
    <linearGradient id="deep" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3d3580"/>
      <stop offset="100%" style="stop-color:#2a2266"/>
    </linearGradient>
    <linearGradient id="indigo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4338ca"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect x="16" y="16" width="480" height="480" rx="96" fill="url(#bg)"/>
  <!-- Outer glow ring -->
  <polygon points="256,88 420,256 256,424 92,256" fill="none" stroke="url(#indigo)" stroke-width="0.5" opacity="0.06"/>
  <!-- Outer diamond — the surface (price) -->
  <polygon points="256,112 400,256 256,400 112,256" fill="none" stroke="url(#indigo)" stroke-width="2" stroke-linejoin="round" opacity="0.4"/>
  <!-- Crown facets — top -->
  <line x1="256" y1="112" x2="208" y2="208" stroke="url(#indigo)" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>
  <line x1="256" y1="112" x2="304" y2="208" stroke="url(#indigo)" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>
  <!-- Crown facets — right -->
  <line x1="400" y1="256" x2="304" y2="208" stroke="url(#indigo)" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>
  <line x1="400" y1="256" x2="304" y2="304" stroke="url(#indigo)" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
  <!-- Crown facets — bottom -->
  <line x1="256" y1="400" x2="304" y2="304" stroke="url(#indigo)" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
  <line x1="256" y1="400" x2="208" y2="304" stroke="url(#indigo)" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
  <!-- Crown facets — left -->
  <line x1="112" y1="256" x2="208" y2="208" stroke="url(#indigo)" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>
  <line x1="112" y1="256" x2="208" y2="304" stroke="url(#indigo)" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
  <!-- Inner diamond — the intrinsic value -->
  <polygon points="256,208 304,256 256,304 208,256" fill="url(#deep)" opacity="0.5"/>
  <polygon points="256,208 304,256 256,304 208,256" fill="none" stroke="url(#gold)" stroke-width="3" stroke-linejoin="round" opacity="0.9"/>
  <!-- Inner facet cross -->
  <line x1="256" y1="208" x2="256" y2="304" stroke="url(#gold)" stroke-width="1" opacity="0.3"/>
  <line x1="208" y1="256" x2="304" y2="256" stroke="url(#gold)" stroke-width="1" opacity="0.3"/>
  <!-- Center hub — the core value -->
  <circle cx="256" cy="256" r="8" fill="url(#gold)" opacity="0.95"/>
  <circle cx="256" cy="256" r="4.5" fill="#141428"/>
  <circle cx="256" cy="256" r="2" fill="url(#gold2)" opacity="0.95"/>
</svg>
