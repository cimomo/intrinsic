<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="facetLeft" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4338ca"/>
      <stop offset="100%" stop-color="#3730a3"/>
    </linearGradient>
    <linearGradient id="facetRight" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="facetTopLeft" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#a5b4fc"/>
    </linearGradient>
    <linearGradient id="facetTopRight" x1="1" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="innerGlow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="innerLeft" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="innerRight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- Outer diamond -->
  <!-- Left facet -->
  <polygon points="256,72 88,264 256,440" fill="url(#facetLeft)"/>
  <!-- Right facet -->
  <polygon points="256,72 424,264 256,440" fill="url(#facetRight)"/>
  <!-- Top-left crown facet -->
  <polygon points="256,72 184,176 256,208" fill="url(#facetTopLeft)"/>
  <!-- Top-right crown facet -->
  <polygon points="256,72 328,176 256,208" fill="url(#facetTopRight)"/>
  <!-- Lower-left depth facet -->
  <polygon points="184,176 256,208 256,440 88,264" fill="#312e81" opacity="0.35"/>
  <!-- Lower-right depth facet -->
  <polygon points="328,176 256,208 256,440 424,264" fill="#1e1b4b" opacity="0.25"/>

  <!-- Inner diamond — the intrinsic value -->
  <!-- Left inner facet -->
  <polygon points="256,172 200,264 256,348" fill="url(#innerLeft)"/>
  <!-- Right inner facet -->
  <polygon points="256,172 312,264 256,348" fill="url(#innerRight)"/>

  <!-- Subtle inner highlight -->
  <polygon points="256,172 228,218 256,232 284,218" fill="#fef3c7" opacity="0.6"/>
</svg>
