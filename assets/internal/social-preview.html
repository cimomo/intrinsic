<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>Intrinsic — Social Preview</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1280px;
    height: 640px;
    overflow: hidden;
    font-family: 'DM Sans', sans-serif;
    background: linear-gradient(135deg, #141428 0%, #0c0c1e 100%);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .container {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    padding: 0 100px;
    position: relative;
    overflow: hidden;
  }

  .container::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 35%;
    transform: translate(-50%, -50%);
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(99, 102, 241, 0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  .left {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 24px;
    z-index: 1;
  }

  .title {
    font-size: 72px;
    font-weight: 700;
    letter-spacing: -2px;
    background: linear-gradient(135deg, #d4a03c 0%, #f5d78e 40%, #c8922a 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
  }

  .tagline {
    font-size: 26px;
    font-weight: 300;
    color: rgba(255, 255, 255, 0.5);
    font-style: italic;
    letter-spacing: 0.5px;
  }

  .subtitle {
    font-size: 17px;
    font-weight: 400;
    color: rgba(255, 255, 255, 0.3);
    letter-spacing: 0.3px;
    margin-top: -8px;
  }

  .pills {
    display: flex;
    gap: 10px;
    margin-top: 8px;
  }

  .pill {
    padding: 6px 16px;
    border-radius: 14px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .pill-research {
    background: rgba(99, 102, 241, 0.15);
    color: #818cf8;
  }

  .pill-value {
    background: rgba(212, 160, 60, 0.15);
    color: #f5d78e;
  }

  .pill-report {
    background: rgba(245, 215, 142, 0.1);
    color: #d4a03c;
  }

  .right {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1;
    margin-left: 40px;
  }

  .gem {
    width: 340px;
    height: 340px;
  }

  .badge {
    position: absolute;
    bottom: 44px;
    right: 100px;
    font-size: 14px;
    font-weight: 500;
    color: rgba(255, 255, 255, 0.2);
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>
<div class="container">
  <div class="left">
    <h1 class="title">Intrinsic</h1>
    <p class="tagline">From ticker to thesis.</p>
    <p class="subtitle">Equity research and DCF valuation for Claude Code</p>
    <div class="pills">
      <span class="pill pill-research">Research</span>
      <span class="pill pill-value">Value</span>
      <span class="pill pill-report">Report</span>
    </div>
  </div>
  <div class="right">
    <svg class="gem" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
      <defs>
        <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#6366f1"/>
          <stop offset="100%" style="stop-color:#4338ca"/>
        </linearGradient>
        <linearGradient id="g2" x1="100%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" style="stop-color:#4338ca"/>
          <stop offset="100%" style="stop-color:#6366f1"/>
        </linearGradient>
        <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#d4a03c"/>
          <stop offset="50%" style="stop-color:#f5d78e"/>
          <stop offset="100%" style="stop-color:#c8922a"/>
        </linearGradient>
        <linearGradient id="gold2" x1="100%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" style="stop-color:#c8922a"/>
          <stop offset="50%" style="stop-color:#f5d78e"/>
          <stop offset="100%" style="stop-color:#d4a03c"/>
        </linearGradient>
        <linearGradient id="deep" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#3d3580"/>
          <stop offset="100%" style="stop-color:#2a2266"/>
        </linearGradient>
      </defs>
      <!-- Outer glow -->
      <polygon points="256,72 440,256 256,440 72,256" fill="none" stroke="url(#g1)" stroke-width="0.5" opacity="0.08"/>
      <!-- Outer diamond -->
      <polygon points="256,96 416,256 256,416 96,256" fill="none" stroke="url(#g1)" stroke-width="2.5" stroke-linejoin="round" opacity="0.5"/>
      <!-- Facet lines -->
      <line x1="256" y1="96" x2="196" y2="256" stroke="url(#g1)" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
      <line x1="256" y1="96" x2="316" y2="256" stroke="url(#g1)" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
      <line x1="416" y1="256" x2="256" y2="196" stroke="url(#g1)" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
      <line x1="416" y1="256" x2="256" y2="316" stroke="url(#g2)" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
      <line x1="256" y1="416" x2="316" y2="256" stroke="url(#g2)" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
      <line x1="256" y1="416" x2="196" y2="256" stroke="url(#g2)" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
      <line x1="96" y1="256" x2="256" y2="196" stroke="url(#g2)" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
      <line x1="96" y1="256" x2="256" y2="316" stroke="url(#g1)" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
      <!-- Inner diamond -->
      <polygon points="256,196 316,256 256,316 196,256" fill="url(#deep)" opacity="0.5"/>
      <polygon points="256,196 316,256 256,316 196,256" fill="none" stroke="url(#gold)" stroke-width="3.5" stroke-linejoin="round" opacity="0.9"/>
      <!-- Inner facet cross -->
      <line x1="256" y1="196" x2="256" y2="316" stroke="url(#gold)" stroke-width="1" opacity="0.3"/>
      <line x1="196" y1="256" x2="316" y2="256" stroke="url(#gold)" stroke-width="1" opacity="0.3"/>
      <!-- Center hub -->
      <circle cx="256" cy="256" r="12" fill="url(#gold)" opacity="0.95"/>
      <circle cx="256" cy="256" r="7" fill="#141428"/>
      <circle cx="256" cy="256" r="3" fill="url(#gold2)" opacity="0.95"/>
    </svg>
  </div>
  <div class="badge">cimomo/intrinsic</div>
</div>
</body>
</html>
